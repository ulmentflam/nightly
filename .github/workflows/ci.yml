# Nightly CI — the merge gate, mirrored from `make check`.
#
# Runs ruff (lint), pyrefly (type-check), and pytest across
# {ubuntu-latest, macos-latest} on Python 3.12 — the project's declared
# minimum. Plus a sanity-check that the pre-commit hook config itself
# is valid (`pre-commit run --all-files`).
#
# Cancel any in-flight runs on the same ref when a newer commit lands —
# every contributor pushing twice in a minute shouldn't double-bill CI.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: ${{ matrix.os }} · py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        # v8 line ships immutable per-release tags only (no floating
        # major/minor) — pin to a specific release and let dependabot
        # propose bumps. v8.1.0 is the latest as of 2026-04.
        uses: astral-sh/setup-uv@v8.2.0
        with:
          # Lock to the python version we declare in pyproject.toml.
          python-version: ${{ matrix.python-version }}
          # Cache uv's wheel + venv layer keyed on uv.lock so cold runs
          # only re-resolve when dependencies actually change.
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync workspace
        run: uv sync --all-packages --frozen

      - name: ruff (lint)
        run: uv run --no-sync ruff check

      - name: pyrefly (type-check)
        run: uv run --no-sync pyrefly check

      - name: pytest
        run: uv run --no-sync pytest

      - name: pre-commit (hook config sanity)
        # Confirms `.pre-commit-config.yaml` itself stays runnable. The
        # hooks just shell out to the same tools we already ran above,
        # so this is cheap — pre-commit caches in `~/.cache/pre-commit`.
        run: uv run --no-sync pre-commit run --all-files --show-diff-on-failure
