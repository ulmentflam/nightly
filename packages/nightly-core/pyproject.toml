[project]
name = "nightly-core"
version = "0.0.11"
description = "Nightly's core orchestration — loop, priority cascade, drain, briefing renderer."
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Evan Owen", email = "evan@jwo3.io" }]
dependencies = [
  "pydantic>=2.6",
  "typer>=0.12",
  "jinja2>=3.1",
  "markdown-it-py>=3.0",
  "pyyaml>=6.0",
]

[project.scripts]
nightly = "nightly_core.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nightly_core"]
