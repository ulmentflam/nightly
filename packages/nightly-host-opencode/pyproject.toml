[project]
name = "nightly-host-opencode"
version = "0.0.4"
description = "Nightly host integration for opencode (primary host)."
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Evan Owen", email = "evan@jwo3.io" }]
dependencies = [
  "nightly-core",
  "httpx>=0.27",
  "httpx-sse>=0.4",
]

[tool.uv.sources]
nightly-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nightly_host_opencode"]
