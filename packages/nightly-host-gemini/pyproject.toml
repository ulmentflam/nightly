[project]
name = "nightly-host-gemini"
version = "0.0.3"
description = "Nightly host integration for vanilla Gemini CLI (.gemini/commands)."
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Evan Owen", email = "evan@jwo3.io" }]
dependencies = [
  "nightly-core",
]

[tool.uv.sources]
nightly-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nightly_host_gemini"]
